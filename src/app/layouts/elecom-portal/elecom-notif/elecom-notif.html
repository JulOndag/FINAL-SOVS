<div class="notif-page">

  <div class="page-header">
    <div>
      <h1>Notifications</h1>
      <p class="page-sub">{{ unreadCount }} unread · {{ notifications.length }} total</p>
    </div>
    <div class="header-actions">
      <button class="btn-mark-all" (click)="markAllRead()" *ngIf="unreadCount > 0">
        Mark all as read
      </button>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="ftab" [class.active]="filter === 'all'"    (click)="filter='all'">All</button>
    <button class="ftab" [class.active]="filter === 'unread'" (click)="filter='unread'">
      Unread
      <span class="ftab-count" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
    </button>
    <button class="ftab" [class.active]="filter === 'vote'"      (click)="filter='vote'">Votes</button>
    <button class="ftab" [class.active]="filter === 'candidate'" (click)="filter='candidate'">Candidates</button>
    <button class="ftab" [class.active]="filter === 'election'"  (click)="filter='election'">Elections</button>
  </div>

  <!-- Notification list -->
  <div class="notif-list" *ngIf="filteredNotifs.length > 0">
    <div
      class="notif-item"
      *ngFor="let n of filteredNotifs"
      [class.unread]="!n.read"
      (click)="markRead(n)">
      <div class="notif-icon" [ngClass]="n.type">
        <svg *ngIf="n.type==='vote'"      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <svg *ngIf="n.type==='candidate'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4"/><path d="M16 11l2 2 4-4"/></svg>
        <svg *ngIf="n.type==='election'"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        <svg *ngIf="n.type==='warning'"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>
        <svg *ngIf="n.type==='user'"      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="notif-body">
        <div class="notif-title">{{ n.title }}</div>
        <div class="notif-sub">{{ n.message }}</div>
        <div class="notif-time">{{ n.time }}</div>
      </div>
      <div class="notif-dot" *ngIf="!n.read"></div>
    </div>
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="filteredNotifs.length === 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <p>No notifications here</p>
  </div>

</div>
