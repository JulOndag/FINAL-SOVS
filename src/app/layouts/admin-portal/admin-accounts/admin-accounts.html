<div class="admin-accounts">
  <div class="page-header">
    <div class="header-left">
      <h1>🏛️ Accounts / Voters</h1>
      <p class="page-sub">Manage Election Committee and voter accounts</p>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h2>🏛️ ELECOM Accounts</h2>
    </div>
    <div class="accounts-info">
      <p>
        Create Election Committee (ELECOM) accounts. ELECOM members can monitor real-time results,
        manage voters, and oversee the election process.
      </p>
      <button class="btn-create" (click)="openAccountModal()">🏛️ Create ELECOM Account</button>
    </div>
  </div>

  <!-- CREATE ELECOM ACCOUNT MODAL -->
  <div class="modal-overlay" *ngIf="showAccountModal" (click)="closeAccountModal()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>🏛️ Create ELECOM Account</h3>
        <button class="modal-close" (click)="closeAccountModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" [(ngModel)]="accountForm.name" placeholder="e.g. Maria Santos" />
        </div>
        <div class="form-group">
          <label>Username *</label>
          <input type="text" [(ngModel)]="accountForm.username" placeholder="e.g. msantos" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input
            type="email"
            [(ngModel)]="accountForm.email"
            placeholder="e.g. msantos@ustp.edu.ph"
          />
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input
            type="password"
            [(ngModel)]="accountForm.password"
            placeholder="Min. 6 characters"
          />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeAccountModal()">Cancel</button>
        <button class="btn-save" (click)="createElecomAccount()" [disabled]="creatingAccount">
          {{ creatingAccount ? 'Creating...' : 'Create ELECOM Account' }}
        </button>
      </div>
    </div>
  </div>
</div>
