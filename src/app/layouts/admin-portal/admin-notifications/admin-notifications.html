<div class="admin-notifications">
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Notifications</h1>
      <p class="page-subtitle">Candidate applications and ELECOM updates</p>
    </div>
    <div class="header-right">
      <button class="btn-mark-all" (click)="markAllAsRead()" [disabled]="unreadCount === 0">
        Mark all as read
      </button>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.key"
      (click)="setActiveTab(tab.key)"
    >
      {{ tab.label }}
      <span class="tab-count" *ngIf="tab.count > 0">{{ tab.count }}</span>
    </button>
  </div>

  <!-- Loading -->
  <div class="empty-notifs" *ngIf="loading">
    <p>Loading notifications...</p>
  </div>

  <!-- Notifications List -->
  <div class="notifications-list" *ngIf="!loading">
    <div
      *ngFor="let notif of filteredNotifications"
      class="notif-card"
      [class.unread]="!notif.seen"
      (click)="markAsRead(notif)"
    >
      <div class="notif-icon" [ngClass]="'icon-' + getCategory(notif)">
        <!-- candidate icon -->
        <svg
          *ngIf="getCategory(notif) === 'candidates'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <!-- results/elecom icon -->
        <svg
          *ngIf="getCategory(notif) === 'results'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        <!-- system icon -->
        <svg
          *ngIf="getCategory(notif) === 'system'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      </div>

      <div class="notif-body">
        <div class="notif-top">
          <span class="notif-title">{{ notif.title }}</span>
          <span class="unread-dot" *ngIf="!notif.seen"></span>
        </div>
        <p class="notif-message">{{ notif.message }}</p>
        <div class="notif-meta">
          <span class="notif-time">{{ timeAgo(notif.createdAt) }}</span>
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-notifs" *ngIf="filteredNotifications.length === 0">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <p>No notifications yet.</p>
      <span *ngIf="activeTab === 'candidates'">
        Notifications will appear when students submit applications.
      </span>
      <span *ngIf="activeTab === 'elecom'">
        Notifications will appear when elections are audited.
      </span>
    </div>
  </div>
</div>
