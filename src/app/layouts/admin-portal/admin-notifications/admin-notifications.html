<div class="admin-notifications">
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Notifications</h1>
      <p class="page-subtitle">All ELECOM submissions and system alerts</p>
    </div>
    <div class="header-right">
      <button class="btn-mark-all" (click)="markAllAsRead()" [disabled]="unreadCount === 0">
        Mark all as read
      </button>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.key"
      (click)="setActiveTab(tab.key)"
    >
      {{ tab.label }}
      <span class="tab-count" *ngIf="tab.count > 0">{{ tab.count }}</span>
    </button>
  </div>

  <!-- Notifications List -->
  <div class="notifications-list">
    <div
      *ngFor="let notif of filteredNotifications"
      class="notif-card"
      [class.unread]="!notif.read"
      (click)="markAsRead(notif)"
    >
      <div class="notif-icon" [ngClass]="'icon-' + notif.category">
        <!-- candidates -->
        <svg
          *ngIf="notif.category === 'candidates'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <!-- results -->
        <svg
          *ngIf="notif.category === 'results'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        <!-- timeline -->
        <svg
          *ngIf="notif.category === 'timeline'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <!-- rules -->
        <svg
          *ngIf="notif.category === 'rules'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
        </svg>
        <!-- system -->
        <svg
          *ngIf="notif.category === 'system'"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      </div>

      <div class="notif-body">
        <div class="notif-top">
          <span class="notif-title">{{ notif.title }}</span>
          <span class="unread-dot" *ngIf="!notif.read"></span>
        </div>
        <p class="notif-message">{{ notif.message }}</p>
        <div class="notif-meta">
          <span class="notif-sender">{{ notif.sender }}</span>
          <span class="meta-sep">·</span>
          <span class="notif-time">{{ notif.time }}</span>
          <span class="meta-sep" *ngIf="notif.actionRequired">·</span>
          <span class="action-required-badge" *ngIf="notif.actionRequired">Action Required</span>
        </div>
      </div>

      <div class="notif-actions" *ngIf="notif.actionRequired" (click)="$event.stopPropagation()">
        <button class="btn-approve-sm" (click)="approveFromNotif(notif)">Approve</button>
        <button class="btn-reject-sm" (click)="rejectFromNotif(notif)">Return</button>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-notifs" *ngIf="filteredNotifications.length === 0">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <p>No notifications here.</p>
    </div>
  </div>
</div>
